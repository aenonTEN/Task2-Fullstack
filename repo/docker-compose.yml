services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_PORT: ${API_PORT:-8080}
      DB_DSN: ${DB_DSN:-root:root@tcp(db:3306)/eaglepoint?parseTime=true}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      - attachments_data:/app/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-eaglepoint}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  db_data:
  attachments_data:
